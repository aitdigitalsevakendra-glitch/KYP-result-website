<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verified Official Result Sheet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- QR Code Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
*{box-sizing:border-box;font-family:"Times New Roman", serif;}
body{background:#eaeaea;padding:20px;}

.search-box{
  text-align:center;
  margin-bottom:20px;
}

input,button{
  padding:8px 12px;
  font-size:14px;
}

.result-sheet{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:30px;
  border:3px solid #000;
  position:relative;
}

.header{
  text-align:center;
  border-bottom:2px solid #000;
  padding-bottom:10px;
  margin-bottom:15px;
}

.info-table,
.subject-table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

.info-table td,
.subject-table th,
.subject-table td{
  border:1px solid #000;
  padding:8px;
}

.subject-table th{
  background:#eee;
}

.final{
  text-align:center;
  font-size:20px;
  font-weight:bold;
  margin-top:20px;
}

.pass{color:green;}
.fail{color:red;}

.signature{
  text-align:right;
  margin-top:40px;
}

.qr-box{
  position:absolute;
  top:30px;
  right:30px;
}

.seal{
  position:absolute;
  bottom:80px;
  left:40px;
  font-size:22px;
  color:green;
  border:2px solid green;
  padding:10px;
  transform:rotate(-15deg);
}

.watermark{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-30deg);
  font-size:60px;
  color:red;
  opacity:0.08;
  pointer-events:none;
}

@media print{
  body{background:white;}
  .search-box{display:none;}
  .watermark{opacity:0.03;}
}
</style>
</head>

<body>

<div class="search-box">
  <input type="text" id="code" placeholder="Enter Learner Code">
  <button onclick="checkResult()">View Result</button>
  <button onclick="window.print()">Print Result</button>
</div>

<div id="resultContainer"></div>

<script>
async function checkResult(){

  const code=document.getElementById("code").value.trim();
  const container=document.getElementById("resultContainer");

  if(!code){
    alert("Enter Learner Code");
    return;
  }

  const res=await fetch("results.json");
  const data=await res.json();
  const student=data.find(s=>s.learnerCode===code);

  if(!student){
    container.innerHTML="<h2 style='text-align:center;color:red;'>No Record Found</h2>";
    return;
  }

  const verifyURL = window.location.origin + window.location.pathname + "?verify=" + student.learnerCode;
  const verificationID = "KYP-" + student.learnerCode.slice(-6);

  let statusClass = student.finalStatus==="PASS" ? "pass":"fail";

  container.innerHTML=`
  <div class="result-sheet">

    <div class="watermark">SOFT COPY - NOT ORIGINAL</div>

    <div class="qr-box">
      <div id="qrcode"></div>
    </div>

    <div class="header">
      <h1>KUSHAL YUVA PROGRAM</h1>
      <h3>Official Examination Result Sheet</h3>
      <p>Verification ID: <b>${verificationID}</b></p>
    </div>

    <table class="info-table">
      <tr>
        <td><b>Name</b></td><td>${student.name}</td>
        <td><b>Learner Code</b></td><td>${student.learnerCode}</td>
      </tr>
      <tr>
        <td><b>Batch</b></td><td>${student.batch}</td>
        <td><b>Exam Date</b></td><td>${student.examDate || "-"}</td>
      </tr>
      <tr>
        <td><b>Exam Time</b></td><td>${student.examTime || "-"}</td>
        <td><b>Center</b></td><td>${student.centerName || "AIT Digital Seva Kendra"}</td>
      </tr>
    </table>

    <table class="subject-table">
      <tr>
        <th>Subject</th>
        <th>Status</th>
      </tr>
      <tr><td>BS-CIT</td><td>${student.bs_cit}</td></tr>
      <tr><td>BS-CSS</td><td>${student.bs_css}</td></tr>
      <tr><td>BS-CLS</td><td>${student.bs_cls}</td></tr>
    </table>

    <div class="final ${statusClass}">
      FINAL RESULT: ${student.finalStatus}
    </div>

    <div class="seal">
      ✓ Digitally Verified
    </div>

    <div class="signature">
      _________________________<br>
      Authorized Signatory
    </div>

  </div>
  `;

  new QRCode(document.getElementById("qrcode"), {
      text: verifyURL,
      width:100,
      height:100
  });
}
</script>

</body>
</html>
