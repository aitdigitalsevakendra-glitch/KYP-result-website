<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KYP Result Portal PRO</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  min-height:100vh;
  background:#a01863;
}

/* BACKGROUND */
.bg-wrapper{
  position:fixed;
  inset:0;
  z-index:-1;
  display:flex;
  flex-direction:column;
}

.bg-wrapper img{
  width:100%;
  height:50vh;
  object-fit:cover;
  opacity:0.35;
}

/* HEADER */
.header-text{
  text-align:center;
  font-size:28px;
  font-weight:bold;
  color:#00ff66;
  margin:20px 0;
}

/* CENTER */
.main{
  min-height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
  width:100%;
  max-width:500px;
  background:rgba(255,255,255,0.96);
  padding:25px;
  border-radius:15px;
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#0d6efd;
  color:#fff;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#084298;
}

/* RESULT */
.result-box{
  margin-top:15px;
  padding:15px;
  border-radius:8px;
  display:none;
  text-align:left;
}

.pass{background:#d4edda;color:#155724;}
.fail{background:#f8d7da;color:#721c24;}
.pending{background:#fff3cd;color:#856404;}

/* CERTIFICATE */
.watermark-container{
  position:relative;
  width:100%;
  height:420px;
  margin-top:15px;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  pointer-events:none;
}

.watermark-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-30deg);
  font-size:42px;
  color:red;
  opacity:0.25;
  font-weight:bold;
  text-align:center;
  width:100%;
  pointer-events:none;
}

.signature-hide{
  position:absolute;
  bottom:0;
  width:100%;
  height:150px;
  background:white;
  opacity:0.95;
}

.warning{
  color:red;
  font-weight:bold;
  text-align:center;
  margin-top:10px;
}

</style>
</head>

<body oncontextmenu="return false">

<div class="bg-wrapper">
  <img src="bg1.jpg">
  <img src="bg2.jpg">
</div>

<h1 class="header-text">🔥 KUSHAL YUVA PROGRAM 🔥</h1>

<div class="main">
  <div class="container">

    <input type="text" id="code" placeholder="Learner Code *">
    <input type="text" id="name" placeholder="Learner Name *">

    <select id="batch">
      <option value="">Select Batch</option>
      <option>September 2025</option>
      <option>October 2025</option>
      <option>November 2025</option>
    </select>

    <button onclick="checkResult()">Check Result</button>

    <div id="resultBox" class="result-box"></div>

  </div>
</div>

<script>

document.addEventListener("keydown", function(e){
  if(e.ctrlKey && (e.key === "s" || e.key === "p")){
    e.preventDefault();
  }
});

async function checkResult(){

  const code=document.getElementById("code").value.trim();
  const name=document.getElementById("name").value.trim().toLowerCase();
  const batch=document.getElementById("batch").value;
  const resultBox=document.getElementById("resultBox");

  if(!code || !name || !batch){
    alert("Enter All Details");
    return;
  }

  try{

    const res=await fetch("./results.json");
    const data=await res.json();

    const student=data.find(s =>
      s.learnerCode===code &&
      s.batch===batch &&
      s.name.toLowerCase().includes(name)
    );

    if(student){

      let statusClass =
        student.finalStatus==="PASS" ? "pass" :
        student.finalStatus==="FAIL" ? "fail" :
        "pending";

      resultBox.className="result-box "+statusClass;
      resultBox.style.display="block";

      let certificateSection="";

      if(student.finalStatus==="PASS" && student.certificate){

        certificateSection=`
          <div class="watermark-container">
            <iframe src="${student.certificate}"></iframe>

            <div class="watermark-text">
              SOFT COPY – NOT ORIGINAL
            </div>

            <div class="signature-hide"></div>
          </div>

          <div class="warning">
            ⚠ This is only a Soft Copy. Original Certificate Available at Center.
          </div>
        `;
      }

      resultBox.innerHTML=`
        <b>Name:</b> ${student.name}<br>
        <b>Batch:</b> ${student.batch}<br><br>

        <b>BS-CIT:</b> ${student.bs_cit}<br>
        <b>BS-CSS:</b> ${student.bs_css}<br>
        <b>BS-CLS:</b> ${student.bs_cls}<br><br>

        <b>Final Status:</b> ${student.finalStatus}

        ${certificateSection}
      `;

    }else{
      resultBox.className="result-box fail";
      resultBox.style.display="block";
      resultBox.innerHTML="❌ No Record Found";
    }

  }catch(error){
    alert("Error loading results.json");
    console.log(error);
  }
}

</script>

</body>
</html>
