<script>

async function checkResult(){

  const code=document.getElementById("code").value.trim();
  const batch=document.getElementById("batch").value;
  const resultBox=document.getElementById("resultBox");

  if(!code || !batch){
    alert("Enter Learner Code & Select Batch");
    return;
  }

  const res=await fetch("results.json");
  const data=await res.json();

  const student=data.find(s =>
    s.learnerCode===code && s.batch===batch
  );

  if(student){

    let statusClass =
      student.finalStatus==="PASS" ? "pass" :
      student.finalStatus==="FAIL" ? "fail" :
      "pending";

    resultBox.className="result-box "+statusClass;
    resultBox.style.display="block";

    let certificateSection = "";

    if(student.finalStatus==="PASS" && student.certificate){

      certificateSection = `
        <br><br>
        <b>Certificate:</b><br><br>

        <iframe src="${student.certificate}" width="100%" height="300px"></iframe>

        <br><br>
        <a href="${student.certificate}" download>
          <button style="background:green;">📄 Download Certificate</button>
        </a>
      `;
    }

    resultBox.innerHTML = `
      <b>Name:</b> ${student.name}<br>
      <b>Batch:</b> ${student.batch}<br><br>

      <b>BS-CIT:</b> ${student.bs_cit}<br>
      <b>BS-CSS:</b> ${student.bs_css}<br>
      <b>BS-CLS:</b> ${student.bs_cls}<br><br>

      <b>Final Status:</b> ${student.finalStatus}

      ${certificateSection}
    `;

  }else{
    resultBox.className="result-box fail";
    resultBox.style.display="block";
    resultBox.innerHTML="❌ No Record Found";
  }
}

</script>
