<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Result Sheet</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Times New Roman", serif;
}

body{
  background:#f4f4f4;
  padding:20px;
}

.result-sheet{
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:30px;
  border:3px solid #000;
  box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.header{
  text-align:center;
  border-bottom:2px solid #000;
  padding-bottom:15px;
  margin-bottom:20px;
}

.header h1{
  font-size:24px;
  font-weight:bold;
}

.header h2{
  font-size:18px;
  margin-top:5px;
}

.info-box{
  margin-bottom:20px;
}

.info-box table{
  width:100%;
  border-collapse:collapse;
}

.info-box td{
  padding:8px;
  border:1px solid #000;
}

.subject-table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}

.subject-table th,
.subject-table td{
  border:1px solid #000;
  padding:8px;
  text-align:center;
}

.subject-table th{
  background:#eee;
}

.final-result{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
  text-align:center;
}

.pass{color:green;}
.fail{color:red;}

.footer{
  margin-top:40px;
  text-align:right;
}

.watermark{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-30deg);
  font-size:60px;
  color:red;
  opacity:0.1;
  pointer-events:none;
}
button{
  margin-top:20px;
  padding:10px 20px;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="watermark">SOFT COPY - NOT ORIGINAL</div>

<div style="max-width:900px;margin:auto;text-align:center;margin-bottom:20px;">
<input type="text" id="code" placeholder="Enter Learner Code">
<button onclick="checkResult()">View Result</button>
</div>

<div id="resultContainer"></div>

<script>
async function checkResult(){

  const code=document.getElementById("code").value.trim();
  const container=document.getElementById("resultContainer");

  if(!code){
    alert("Enter Learner Code");
    return;
  }

  try{
    const res=await fetch("results.json");
    const data=await res.json();

    const student=data.find(s=>s.learnerCode===code);

    if(!student){
      container.innerHTML="<h2 style='text-align:center;color:red;'>No Record Found</h2>";
      return;
    }

    let statusClass = student.finalStatus==="PASS" ? "pass" : "fail";

    container.innerHTML=`
      <div class="result-sheet">

        <div class="header">
          <h1>KUSHAL YUVA PROGRAM</h1>
          <h2>Official Examination Result Sheet</h2>
        </div>

        <div class="info-box">
          <table>
            <tr>
              <td><b>Name</b></td>
              <td>${student.name}</td>
              <td><b>Learner Code</b></td>
              <td>${student.learnerCode}</td>
            </tr>
            <tr>
              <td><b>Batch</b></td>
              <td>${student.batch}</td>
              <td><b>Exam Date</b></td>
              <td>${student.examDate || "-"}</td>
            </tr>
            <tr>
              <td><b>Exam Time</b></td>
              <td>${student.examTime || "-"}</td>
              <td><b>Center Name</b></td>
              <td>${student.centerName || "AIT Digital Seva Kendra"}</td>
            </tr>
          </table>
        </div>

        <table class="subject-table">
          <tr>
            <th>Subject</th>
            <th>Status</th>
          </tr>
          <tr>
            <td>BS-CIT</td>
            <td>${student.bs_cit || "-"}</td>
          </tr>
          <tr>
            <td>BS-CSS</td>
            <td>${student.bs_css || "-"}</td>
          </tr>
          <tr>
            <td>BS-CLS</td>
            <td>${student.bs_cls || "-"}</td>
          </tr>
        </table>

        <div class="final-result ${statusClass}">
          FINAL RESULT: ${student.finalStatus}
        </div>

        <div class="footer">
          ___________________________<br>
          Authorized Signatory
        </div>

      </div>
    `;

  }catch(err){
    alert("results.json load error");
  }
}
</script>

</body>
</html>
