<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KYP Result Portal PRO</title>

<style>

body{
  font-family: Arial;
  background:#a01863;
  margin:0;
  padding:20px;
  text-align:center;
}

.container{
  background:white;
  max-width:500px;
  margin:auto;
  padding:25px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
  color:#00ff66;
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:15px;
}

button{
  background:#0d6efd;
  color:white;
  font-weight:bold;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#084298;
}

.result-box{
  margin-top:15px;
  padding:15px;
  border-radius:8px;
  display:none;
}

.pass{background:#d4edda;color:#155724;}
.fail{background:#f8d7da;color:#721c24;}
.pending{background:#fff3cd;color:#856404;}

.watermark-container{
  position:relative;
  width:100%;
  height:400px;
  margin-top:15px;
}

.watermark-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-30deg);
  font-size:38px;
  color:red;
  opacity:0.25;
  font-weight:bold;
  text-align:center;
  width:100%;
  pointer-events:none;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

.warning{
  color:red;
  font-weight:bold;
  margin-top:10px;
}

</style>
</head>

<body oncontextmenu="return false">

<h1>🔥 KUSHAL YUVA PROGRAM 🔥</h1>

<div class="container">

<input type="text" id="code" placeholder="Enter Learner Code">
<select id="batch">
  <option value="">Select Batch</option>
  <option>September 2025</option>
  <option>October 2025</option>
  <option>November 2025</option>
</select>

<button onclick="checkResult()">Check Result</button>

<div id="resultBox" class="result-box"></div>

</div>

<script>

async function checkResult(){

  const code=document.getElementById("code").value.trim();
  const batch=document.getElementById("batch").value;
  const resultBox=document.getElementById("resultBox");

  if(!code || !batch){
    alert("Enter Learner Code & Select Batch");
    return;
  }

  try{

    const res=await fetch("./results.json");
    const data=await res.json();

    const student=data.find(s =>
      s.learnerCode===code && s.batch===batch
    );

    if(student){

      let statusClass =
        student.finalStatus==="PASS" ? "pass" :
        student.finalStatus==="FAIL" ? "fail" :
        "pending";

      resultBox.className="result-box "+statusClass;
      resultBox.style.display="block";

      let certificateSection="";

      if(student.finalStatus==="PASS" && student.certificate){

        certificateSection=`
          <div class="watermark-container">
            <iframe src="${student.certificate}"></iframe>
            <div class="watermark-text">
              SOFT COPY – NOT ORIGINAL
            </div>
          </div>

          <div class="warning">
            ⚠ Original Certificate Only Available at Center
          </div>
        `;
      }

      resultBox.innerHTML=`
        <b>Name:</b> ${student.name}<br>
        <b>Batch:</b> ${student.batch}<br><br>

        <b>BS-CIT:</b> ${student.bs_cit}<br>
        <b>BS-CSS:</b> ${student.bs_css}<br>
        <b>BS-CLS:</b> ${student.bs_cls}<br><br>

        <b>Final Status:</b> ${student.finalStatus}

        ${certificateSection}
      `;

    }else{
      resultBox.className="result-box fail";
      resultBox.style.display="block";
      resultBox.innerHTML="❌ No Record Found";
    }

  }catch(error){
    alert("Error loading results.json");
    console.log(error);
  }
}

</script>

</body>
</html>
