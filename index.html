<script>

document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function(e){
  if(e.ctrlKey && ["s","p","u","i","c"].includes(e.key.toLowerCase())){
    e.preventDefault();
  }
  if(e.key==="PrintScreen"){
    document.body.innerHTML="";
    alert("Screenshot Disabled");
  }
});

/* DevTools Detection */
setInterval(function(){
  if(window.outerWidth - window.innerWidth > 160 || 
     window.outerHeight - window.innerHeight > 160){
       document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%'>Security Warning</h1>";
  }
},1000);

async function checkResult(){

  const code=document.getElementById("code").value.trim();
  const name=document.getElementById("name").value.trim().toLowerCase();
  const batch=document.getElementById("batch").value;
  const resultBox=document.getElementById("resultBox");

  if(!code || !name || !batch){
    alert("Enter All Details");
    return;
  }

  try{

    const res=await fetch("./results.json");
    const data=await res.json();

    const student=data.find(s =>
      s.learnerCode===code &&
      s.batch===batch &&
      s.name.toLowerCase().includes(name)
    );

    if(student){

      let statusClass =
        student.finalStatus==="PASS" ? "pass" :
        student.finalStatus==="FAIL" ? "fail" :
        "pending";

      resultBox.className="result-box "+statusClass;
      resultBox.style.display="block";

      let certificateSection="";

      if(student.finalStatus==="PASS" && student.certificate){

        certificateSection=`
          <div class="watermark-container">
            <iframe src="${student.certificate}"></iframe>

            <div class="watermark-text" style="
              animation: moveWatermark 5s infinite linear;
            ">
              SOFT COPY – NOT ORIGINAL
            </div>

            <div class="signature-hide"></div>
          </div>

          <div class="warning">
            ⚠ This is only a Soft Copy. Original Certificate Available at Center.
          </div>
        `;
      }

      resultBox.innerHTML=`
        <b>Name:</b> ${student.name}<br>
        <b>Batch:</b> ${student.batch}<br><br>

        <b>BS-CIT:</b> ${student.bs_cit}<br>
        <b>BS-CSS:</b> ${student.bs_css}<br>
        <b>BS-CLS:</b> ${student.bs_cls}<br><br>

        <b>Final Status:</b> ${student.finalStatus}
        ${certificateSection}
      `;

    }else{
      resultBox.className="result-box fail";
      resultBox.style.display="block";
      resultBox.innerHTML="❌ No Record Found";
    }

  }catch(error){
    alert("Error loading results.json");
    console.log(error);
  }
}

</script>
